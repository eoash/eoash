<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>계산기</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; background: #1a1a2e; font-family: 'Segoe UI', sans-serif;
    }
    .calculator {
      background: #16213e; border-radius: 16px; padding: 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4); width: 320px;
    }
    .display {
      background: #0f3460; border-radius: 12px; padding: 16px 20px;
      margin-bottom: 20px; text-align: right; min-height: 80px;
      display: flex; flex-direction: column; justify-content: flex-end;
    }
    .display .expression { color: #8899aa; font-size: 14px; min-height: 20px; }
    .display .result { color: #e94560; font-size: 32px; font-weight: 700; }
    .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    button {
      padding: 18px; font-size: 18px; border: none; border-radius: 10px;
      cursor: pointer; transition: all 0.15s; font-weight: 600;
    }
    button:active { transform: scale(0.95); }
    .btn-number { background: #1a1a4e; color: #fff; }
    .btn-number:hover { background: #2a2a6e; }
    .btn-operator { background: #e94560; color: #fff; }
    .btn-operator:hover { background: #ff6b81; }
    .btn-clear { background: #533483; color: #fff; }
    .btn-clear:hover { background: #6b44a0; }
    .btn-equals { background: #0f3460; color: #e94560; }
    .btn-equals:hover { background: #1a4a80; }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>
    <div class="buttons">
      <button class="btn-clear" onclick="clearAll()">C</button>
      <button class="btn-clear" onclick="backspace()">&#9003;</button>
      <button class="btn-operator" onclick="addOperator('%')">%</button>
      <button class="btn-operator" onclick="addOperator('/')">&divide;</button>
      <button class="btn-number" onclick="addNumber('7')">7</button>
      <button class="btn-number" onclick="addNumber('8')">8</button>
      <button class="btn-number" onclick="addNumber('9')">9</button>
      <button class="btn-operator" onclick="addOperator('*')">&times;</button>
      <button class="btn-number" onclick="addNumber('4')">4</button>
      <button class="btn-number" onclick="addNumber('5')">5</button>
      <button class="btn-number" onclick="addNumber('6')">6</button>
      <button class="btn-operator" onclick="addOperator('-')">&minus;</button>
      <button class="btn-number" onclick="addNumber('1')">1</button>
      <button class="btn-number" onclick="addNumber('2')">2</button>
      <button class="btn-number" onclick="addNumber('3')">3</button>
      <button class="btn-operator" onclick="addOperator('+')">+</button>
      <button class="btn-number" onclick="addNumber('0')" style="grid-column: span 2;">0</button>
      <button class="btn-number" onclick="addNumber('.')">.</button>
      <button class="btn-equals" onclick="calculate()">=</button>
    </div>
  </div>
  <script>
    let expression = '';
    let justCalculated = false;

    function updateDisplay() {
      document.getElementById('expression').textContent = expression;
    }

    function addNumber(num) {
      if (justCalculated) { expression = ''; justCalculated = false; }
      if (num === '.' && expression.split(/[\+\-\*\/\%]/).pop().includes('.')) return;
      expression += num;
      updateDisplay();
    }

    function addOperator(op) {
      justCalculated = false;
      if (expression === '' && op !== '-') return;
      const last = expression.slice(-1);
      if (['+','-','*','/','%'].includes(last)) {
        expression = expression.slice(0, -1);
      }
      expression += op;
      updateDisplay();
    }

    function calculate() {
      if (!expression) return;
      try {
        const result = Function('"use strict"; return (' + expression + ')')();
        const display = Number.isInteger(result) ? result.toString() : parseFloat(result.toFixed(10)).toString();
        document.getElementById('expression').textContent = expression + ' =';
        document.getElementById('result').textContent = display;
        expression = display;
        justCalculated = true;
      } catch { document.getElementById('result').textContent = 'Error'; }
    }

    function clearAll() {
      expression = '';
      justCalculated = false;
      document.getElementById('expression').textContent = '';
      document.getElementById('result').textContent = '0';
    }

    function backspace() {
      expression = expression.slice(0, -1);
      updateDisplay();
      if (!expression) document.getElementById('result').textContent = '0';
    }

    document.addEventListener('keydown', (e) => {
      if (e.key >= '0' && e.key <= '9' || e.key === '.') addNumber(e.key);
      else if (['+','-','*','/','%'].includes(e.key)) addOperator(e.key);
      else if (e.key === 'Enter' || e.key === '=') calculate();
      else if (e.key === 'Backspace') backspace();
      else if (e.key === 'Escape') clearAll();
    });
  </script>
</body>
</html>
