<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>계산기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
    }

    .calculator {
      background: #16213e;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      width: 320px;
    }

    .display {
      background: #0f3460;
      border-radius: 12px;
      padding: 20px 16px 12px;
      margin-bottom: 20px;
      text-align: right;
    }

    .display .expression {
      color: #a0a0c0;
      font-size: 14px;
      min-height: 20px;
      margin-bottom: 8px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .display .result {
      color: #e0e0ff;
      font-size: 36px;
      font-weight: 300;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      height: 60px;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.1s;
    }

    button:active { transform: scale(0.93); }

    .btn-num {
      background: #1a2744;
      color: #e0e0ff;
    }

    .btn-num:hover { background: #1f2f52; }

    .btn-op {
      background: #0f3460;
      color: #7eb8f7;
    }

    .btn-op:hover { background: #144070; }

    .btn-eq {
      background: #e94560;
      color: #fff;
      font-size: 22px;
    }

    .btn-eq:hover { background: #f05070; }

    .btn-clear {
      background: #533483;
      color: #fff;
    }

    .btn-clear:hover { background: #6340a0; }

    .btn-zero { grid-column: span 2; }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>
    <div class="buttons">
      <button class="btn-clear" onclick="clearAll()">AC</button>
      <button class="btn-op"    onclick="toggleSign()">+/-</button>
      <button class="btn-op"    onclick="percent()">%</button>
      <button class="btn-op"    onclick="setOp('/')">÷</button>

      <button class="btn-num"   onclick="input('7')">7</button>
      <button class="btn-num"   onclick="input('8')">8</button>
      <button class="btn-num"   onclick="input('9')">9</button>
      <button class="btn-op"    onclick="setOp('*')">×</button>

      <button class="btn-num"   onclick="input('4')">4</button>
      <button class="btn-num"   onclick="input('5')">5</button>
      <button class="btn-num"   onclick="input('6')">6</button>
      <button class="btn-op"    onclick="setOp('-')">−</button>

      <button class="btn-num"   onclick="input('1')">1</button>
      <button class="btn-num"   onclick="input('2')">2</button>
      <button class="btn-num"   onclick="input('3')">3</button>
      <button class="btn-op"    onclick="setOp('+')">+</button>

      <button class="btn-num btn-zero" onclick="input('0')">0</button>
      <button class="btn-num"   onclick="dot()">.</button>
      <button class="btn-eq"    onclick="calculate()">=</button>
    </div>
  </div>

  <script>
    let current = '0';
    let prev = null;
    let op = null;
    let justCalc = false;

    const $result = document.getElementById('result');
    const $expr   = document.getElementById('expression');

    function render() {
      $result.textContent = current.length > 12
        ? parseFloat(current).toExponential(4)
        : current;
    }

    function input(digit) {
      if (justCalc) { current = digit; justCalc = false; }
      else if (current === '0') current = digit;
      else if (current.length < 12) current += digit;
      render();
    }

    function dot() {
      if (justCalc) { current = '0.'; justCalc = false; }
      else if (!current.includes('.')) current += '.';
      render();
    }

    function setOp(o) {
      if (op && !justCalc) calculate(true);
      prev = parseFloat(current);
      op = o;
      justCalc = true;
      const sym = { '+':'+', '-':'−', '*':'×', '/':'÷' }[o];
      $expr.textContent = `${prev} ${sym}`;
    }

    function calculate(chain = false) {
      if (op === null || prev === null) return;
      const b = parseFloat(current);
      const sym = { '+':'+', '-':'−', '*':'×', '/':'÷' }[op];
      $expr.textContent = `${prev} ${sym} ${b} =`;
      let res;
      if (op === '+') res = prev + b;
      else if (op === '-') res = prev - b;
      else if (op === '*') res = prev * b;
      else if (op === '/') res = b === 0 ? '오류' : prev / b;
      current = String(parseFloat(res.toFixed(10)));
      if (!chain) { op = null; prev = null; }
      justCalc = true;
      render();
    }

    function clearAll() {
      current = '0'; prev = null; op = null; justCalc = false;
      $expr.textContent = '';
      render();
    }

    function toggleSign() {
      if (current !== '0') current = String(-parseFloat(current));
      render();
    }

    function percent() {
      current = String(parseFloat(current) / 100);
      render();
    }

    document.addEventListener('keydown', e => {
      if (e.key >= '0' && e.key <= '9') input(e.key);
      else if (e.key === '.') dot();
      else if (e.key === '+') setOp('+');
      else if (e.key === '-') setOp('-');
      else if (e.key === '*') setOp('*');
      else if (e.key === '/') { e.preventDefault(); setOp('/'); }
      else if (e.key === 'Enter' || e.key === '=') calculate();
      else if (e.key === 'Escape') clearAll();
      else if (e.key === 'Backspace') {
        if (current.length > 1) current = current.slice(0, -1);
        else current = '0';
        render();
      }
    });
  </script>
</body>
</html>
