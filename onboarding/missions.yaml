        type: confirm
        link: "https://www.notion.so/25b74768ec3780b28eb0e303bd324d5f"
        complete_message: "팀 온보딩 문서 확인 완료!"

  # ──────────────────────────────────────
  # CATEGORY 4: 업무 프로세스 이해
  # ──────────────────────────────────────
  - id: process
    name: "업무 프로세스 이해"
    emoji: "⚙️"
    order: 4
    description: "EO의 핵심 업무 프로세스를 이해합니다."
    missions:

      - id: project_tools
        title: "프로젝트 관리 도구 확인하기"
        description: >
          EO에서 사용하는 주요 도구:
          • Notion — 문서, 위키, SOT
          • Slack — 커뮤니케이션 (채널 우선!)
          • ClickUp — 프로젝트 상태 + 예산 트래킹 (글로벌 비즈니스)
          • Linear — 이슈 트래킹 (프로덕트, 매거진 SEO)
          • Frame.io — 영상 피드백
          • Figma — 디자인, 썸네일 템플릿
          • Airtable — 지출요청, 프리랜서 정산
          • Google Drive — 파일 관리 (파일명에 날짜 포함 필수!)
        type: quiz
        question: "EO에서 프로젝트 예산과 상태를 트래킹하는 도구는?"
        options:
          - "Notion"
          - "ClickUp"
          - "Google Sheets"
        answer: 1
        wrong_message: "글로벌 비즈니스팀은 ClickUp에서 프로젝트 상태와 예산을 트래킹합니다."
        complete_message: "정답! ClickUp으로 프로젝트 관리, Notion으로 문서/위키를 관리합니다."

      - id: outsource_contract
        title: "외주 계약 요청 프로세스 이해하기"
        description: >
          프리랜서/외주 계약이 필요할 때:
          1. `#request-외주계약요청` 채널에서 폼 제출
          2. 접수 후 ASH(안서현)가 계약서 처리
          3. 새로운 외주업체는 ASH 승인 필요
          4. 반복 프리랜서: 최초 계약서 1장, 조건 변경 시 재계약
          주요 프리랜서: 썸네일(건당 4만원), 컷편집, 모션그래픽, 번역, 시나리오
        type: quiz
        question: "외주 계약 요청은 어디서 하나요?"
        options:
          - "ASH에게 직접 DM"
          - "#request-외주계약요청 채널에서 폼 제출"
          - "ClickUp에서 태스크 생성"
        answer: 1
        wrong_message: "`#request-외주계약요청` 채널에서 폼을 제출합니다. DM이 아니에요!"
        complete_message: "정답! 채널에서 폼 제출 → ASH가 계약서 처리 → 완료 알림 순서입니다."

      - id: content_workflow
        title: "콘텐츠 제작 워크플로우 이해하기"
        description: >
          영상 제작 플로우:
          인터뷰 → 스토리라인 작성 → 편집 → Frame.io 피드백 → 수정 → 발행
          핵심 원칙:
          • 인터뷰 후 24시간 내 편집 시작
          • B-roll은 사전 요청
          • IP 구분 중요: KR vs GL — 작업자와 채널이 다름
          • 숏폼: 3개씩 묶어 스케줄 업로드
          • 촬영 일정: `#all-타임테이블` 채널에서 확인
          • 편집 도구: Final Cut Pro + Red Giant
          • 피드백: Frame.io (상세 피드백 중요!)
        type: quiz
        question: "EO에서 영상 피드백을 주고받는 플랫폼은?"
        options:
          - "Google Drive 댓글"
          - "Frame.io"
          - "Slack 스레드"
        answer: 1
        wrong_message: "Frame.io에서 영상 피드백을 주고받습니다. 상세하게 남기는 것이 중요해요!"
        complete_message: "정답! Frame.io에 상세 피드백을 남기는 것이 EO 편집 프로세스의 핵심입니다."

      - id: legal_process
        title: "법률 자문 프로세스 이해하기"
        description: >
          법률 자문이 필요할 때:
          1. 먼저 ASH(안서현)에게 확인
          2. 확인 후 `#all-법률자문` 채널에서 이혜윤 변호사(법무법인 영)에게 문의
          3. 자문 기록은 채널에 아카이빙
          주의: 불필요한 자문 자제 (변호사 비용!)
          주요 사례: 해외 크리에이터 계약서, 출연 계약서, 브랜디드 콘텐츠 계약서, 도서 출판권 계약
        type: quiz
        question: "법률 자문이 필요할 때 첫 번째 단계는?"
        options:
          - "#all-법률자문 채널에 바로 질문"
          - "ASH(안서현)에게 먼저 확인"
          - "이혜윤 변호사에게 직접 연락"
        answer: 1
        wrong_message: "법률 자문은 반드시 ASH에게 먼저 확인 후 진행합니다!"
        complete_message: "정답! ASH 확인 → #all-법률자문 채널 → 이혜윤 변호사 순서입니다."

      - id: file_naming
        title: "파일 관리 규칙 확인하기"
        description: >
          EO의 파일 관리 규칙:
          • 파일명 규칙: `날짜_프로젝트명_문서종류_v1`
          • 예시: `2026-03-03_TestBox_Invoice_v1`
          • Google Drive: 프로젝트별 폴더 정리, Final 폴더 분리
          • 계약서/견적서/인보이스: 공유폴더(`거래처 발송서류들`)에서만 관리
          • 개인 PC에 저장 금지!
        type: quiz
        question: "올바른 파일명 형식은?"
        options:
          - "TestBox 인보이스 최종.pdf"
          - "2026-03-03_TestBox_Invoice_v1.pdf"
          - "invoice_testbox_final.pdf"
        answer: 1
        wrong_message: "파일명은 `날짜_프로젝트명_문서종류_버전` 형식을 따릅니다!"
        complete_message: "정답! 날짜를 포함한 규칙적인 파일명이 중요합니다."

      - id: business_card
        title: "명함 신청 방법 확인하기"
        description: >
          명함 신청 절차:
          1. `#all-운영` 채널에서 명함 신청 워크플로우 실행
          2. 입력: 명함 종류(국문/영문), 이름, 직함, 이메일/전화번호
          3. 운영팀이 시안 공유 → 정보 더블체크 후 확정
          4. 영업일 기준 7일 이내 배송
        type: confirm
        complete_message: "명함 신청 방법 확인 완료! 필요하면 `#all-운영`에서 바로 신청하세요."

      - id: notion_workspace_tour
        title: "Notion 워크스페이스 구조 파악하기"
        description: >
          EO Notion의 핵심 페이지 구조:
          • EO STUDIO (홈) — 전체 진입점
          • 📈 비즈니스 챕터 — 사업계획, 타운홀 자료
          • ⚙️ 시스템 운영 — Bill.com, Brex, 온보딩 문서
          • 🛫 GL-Media&Business — 글로벌 미디어/비즈니스 허브
          • 🛸 Magazine — EO Magazine (Veda CMS)
          • 🇰🇷 EO Korea — 한국 콘텐츠
          • 🏫 이오스쿨 — 교육 플랫폼
          • 🌎 GL-EO School — 글로벌 교육 (Kajabi)
          Notion 홈에서 "EO 가이드" → "행동양식" → "업무 매뉴얼" 순서로 읽기를 추천합니다.
        type: confirm
        link: "https://www.notion.so/7fb36f8933944aecae3855ebb9b7d42c"
        complete_message: "Notion 구조 파악 완료! 각 챕터 페이지를 즐겨찾기에 추가해두면 편리합니다."

      - id: thumbnail_request
        title: "썸네일 요청 프로세스 확인하기"
        description: >
          썸네일 제작 요청 시:
          • `#request-썸네일` 채널에서 Slack 폼 + Frame.io 링크 필수 제출
          • IP 구분 중요! KR vs GL — 각각 다른 디자인 가이드라인 적용
          • Photoshop 배경 제거 시 drop shadow 미적용 상태로 저장
          • Figma/Drive에 클린 파일 업로드
          • 프리랜서 단가: 건당 40,000원
        type: confirm
        complete_message: "썸네일 요청 프로세스 확인 완료!"

      - id: onboarding_complete
        title: "온보딩 완료! 다음 단계 확인하기"
        description: >
          축하합니다! 기본 온보딩이 완료되었습니다.
          다음 단계:
          • SOT 문서를 수시로 참고하세요
          • 매일 Geekbot 스탠드업에 참여하세요
          • `#share-ai-info`에서 AI 도구를 탐색해보세요
          • 팀별 온보딩 문서를 정독하세요 (GL/촬영/디자인)
          • 모르는 게 있으면 `#all-무엇이든물어보살`에 질문하세요!
          • 위클리 미팅 참석: GL 위클리, KR 위클리, 팀별 주간 sync
        type: confirm
        complete_message: >
          🎉 온보딩 완료! EO에 오신 것을 진심으로 환영합니다!
          "우리가 레퍼런스가 되어야지, 레퍼런스를 따라가면 안 된다"
          — EO와 함께 성장해나가요!

