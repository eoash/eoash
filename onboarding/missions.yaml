settings:
  reminder_after_days: 2
  deadline_days: 14
  hr_notify_channel: "all-운영"
  welcome_message: >
    안녕하세요! EO Studio에 오신 것을 환영합니다! 🎉
    저는 온보딩을 도와줄 EO 봇이에요.
    지금부터 4개 카테고리, 약 30개의 미션을 함께 진행하며 EO에 적응할 거예요.
    미션은 자유 페이스로 진행되지만, 2주 안에 완료하는 것을 목표로 해주세요.
    준비되셨나요? "시작" 버튼을 눌러주세요!
  complete_message: >
    🎉 축하합니다! 모든 온보딩 미션을 완료했습니다!
    이제 EO의 일원으로서 업무를 시작할 준비가 되었어요.
    모르는 게 있으면 언제든 #all-무엇이든물어보살에 질문하세요.
    EO와 함께 멋진 여정을 시작해봐요! 🚀
  nudge_messages:
    - "안녕하세요! 온보딩 진행하고 계신가요? 이어서 해볼까요? 😊"
    - "아직 완료하지 않은 미션이 있어요! 잠깐 시간 내서 이어가볼까요?"
    - "온보딩이 거의 다 끝나갑니다! 마지막 미션까지 화이팅! 💪"
