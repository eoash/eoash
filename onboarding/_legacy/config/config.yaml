# 신규 입사자 온보딩 시스템 설정 파일
# 코드 수정 없이 이 파일만 수정하면 수집 대상/분석 파라미터를 변경할 수 있습니다.

slack:
  # 수집할 Slack 채널 이름 목록 (# 없이 채널명만 기재)
  channels:
    - C02F1N5P6M6
    - C090YEPLUL9
    - C01N15328HG
  # 채널 ID → 표시 이름 매핑 (가이드 문서에 ID 대신 채널명 표시)
  channel_names:
    C02F1N5P6M6: "all-운영"
    C090YEPLUL9: "all-무엇이든물어보살"
    C01N15328HG: "all-공지사항"
  # 수집 기간 (일 단위, 90일 = 최근 3개월)
  collect_days: 90
  # Slack API Tier 3 Rate Limit 준수용 요청 간 딜레이 (초)
  # Tier 3 기준: 분당 50 요청 → 1.2초 딜레이로 안전하게 운영
  rate_limit_delay: 1.2

notion:
  # 수집할 Notion 페이지 ID 목록
  # Notion 페이지 URL: https://notion.so/workspace/페이지명-{page_id}
  # page_id는 URL 마지막 32자리 (하이픈 포함 시 제거)
  page_ids:
    - 31174768-ec37-804c-8459-ddbbbec6cf7e
  # 워크스페이스 이름 (가이드 문서 헤더에 표시됨)
  workspace_name: "EO Studio"

analysis:
  # 키워드 추출 상위 N개
  keyword_top_n: 10
  # 주요 공지사항 추출 건수
  announcement_count: 5
  # 필독 Notion 문서 선정 건수
  must_read_count: 5
  # 불용어 목록 (빈도 분석에서 제외할 단어)
  stopwords:
    - "이"
    - "가"
    - "을"
    - "를"
    - "은"
    - "는"
    - "의"
    - "에"
    - "에서"
    - "으로"
    - "로"
    - "와"
    - "과"
    - "도"
    - "만"
    - "그"
    - "저"
    - "이런"
    - "저런"
    - "있습니다"
    - "합니다"
    - "됩니다"
    - "했습니다"
    - "the"
    - "a"
    - "an"
    - "is"
    - "are"
    - "was"
    - "were"
    - "in"
    - "on"
    - "at"
    - "to"
    - "for"
    - "of"
    - "and"
    - "or"

output:
  # 온보딩 가이드 저장 경로 (onboarding/ 기준 상대 경로)
  guide_path: "output/ONBOARDING_GUIDE.md"
  # true 시 생성된 가이드를 Notion에 자동 업로드 (NOTION_UPLOAD_PAGE_ID 필요)
  notion_upload: true
  # 완료 알림을 발송할 Slack 채널명 (# 없이)
  slack_notify_channel: "hr-ops"

# 데이터 저장 경로 설정 (기본값 변경 필요 시 수정)
paths:
  raw_data: "data/raw"
  analyzed_data: "data/analyzed"
  output: "output"
  logs: "logs"
  templates: "templates"
