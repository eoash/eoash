name: Weekly Onboarding Guide Update

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  update-onboarding-guide:
    name: Generate Onboarding Guide
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run onboarding pipeline
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_UPLOAD_PAGE_ID: ${{ secrets.NOTION_UPLOAD_PAGE_ID }}
        run: python main.py

      - name: Upload generated guide as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: onboarding-guide-${{ github.run_id }}
          path: |
            output/ONBOARDING_GUIDE.md
            output/SUMMARY_REPORT_*.md
          if-no-files-found: warn
          retention-days: 30
