name: Token Dashboard - Level-Up Notify

on:
  schedule:
    # 매일 오전 10시 KST (= 01:00 UTC)
    - cron: '0 1 * * *'
  workflow_dispatch: # 수동 실행도 가능

jobs:
  check-levelups:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check level-ups and notify
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          cd token-dashboard && python3 scripts/notify_levelup.py --send

      - name: Commit updated level state
        run: |
          cd token-dashboard
          if git diff --quiet scripts/level-state.json; then
            echo "No state changes"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add scripts/level-state.json
            git commit -m "chore: update level-state.json [skip ci]"
            git push
          fi
