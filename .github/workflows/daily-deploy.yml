name: Token Dashboard - Daily Deploy

on:
  schedule:
    # 매일 00:00 KST (15:00 UTC 전날)
    - cron: "0 15 * * *"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_OQ9dmnnn4j9RaqABXmNq6lr7
          VERCEL_PROJECT_ID: prj_uMp43g4R9niPsCYUyrMbcSkEYeXN
        run: npx vercel --prod --token "$VERCEL_TOKEN" --yes
